name: Publish to VS Code Marketplace

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      pre-release:
        description: Publish as pre-release
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Publish to VS Code Marketplace
        run: |
          if [ "${{ github.event.inputs.pre-release }}" = "true" ]; then
            npx vsce publish --pre-release --skip-duplicate -p ${{ secrets.VSCE_PAT }}
          else
            npx vsce publish --skip-duplicate -p ${{ secrets.VSCE_PAT }}
          fi
